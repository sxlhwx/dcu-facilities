<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 시설 현황 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="../data/building.js"></script>
    <script src="../data/facility.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">DCU ADMIN <span id="loadingTag">SYNCING...</span></div>
  <button id="logoutBtn" onclick="handleLogout()">LOGOUT</button>
</div>

<div class="admin-wrap">
  <div id="loginSection">
    <div class="card">
      <div class="card-title">Auth Required</div>
      <input type="email" id="adminEmail" placeholder="Email" style="margin-bottom:10px;">
      <input type="password" id="adminPw" placeholder="Password" style="margin-bottom:18px;">
      <button class="btn" onclick="handleLogin()">LOG IN</button>
    </div>
  </div>

  <div id="uploadSection" style="display:none">
    <div class="card">
      <div class="card-title">Manage Facility</div>
      <div class="form-group">
        <label>시설 검색</label>
        <div class="autocomplete-wrap">
          <input type="text" id="facilitySearch" placeholder="이름 또는 건물번호 입력" autocomplete="off">
          <div class="ac-dropdown" id="acDropdown"></div>
        </div>
      </div>
      <div class="form-group">
        <label>ID / 검증 상태</label>
        <div class="id-verified-row">
          <input type="text" id="facilityId" readonly placeholder="ID">
          <label class="verified-label">
            <input type="checkbox" id="isVerified"> Verified
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>출처 데이터 (선택)</label>
        <input type="date" id="uploadDate" style="margin-bottom:8px;">
        <input type="url" id="sourceLink" placeholder="출처 URL" style="margin-bottom:8px;">
        <input type="file" id="imageFile" accept="image/*" style="font-size:11px;">
      </div>
      <button class="btn" id="uploadBtn" onclick="handleUpload()">Update Status</button>
    </div>

    <div class="card">
      <div class="card-title">
        Current Status 
        <span id="refreshBtn" style="cursor:pointer; text-decoration:underline;">REFRESH</span>
      </div>
      <table class="status-table">
        <thead>
          <tr>
            <th>Facility</th>
            <th style="text-align:center;">V</th>
            <th style="text-align:right;">Data</th>
          </tr>
        </thead>
        <tbody id="statusList"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="logic.js"></script>
</body>
</html>
