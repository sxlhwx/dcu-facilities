<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 시설 정보 업데이트</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .admin-container { background: white; padding: 30px; border-radius: 12px; max-width: 500px; margin: 40px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #007bff; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        #uploadSection { display: none; }
        .preview { max-width: 100%; border-radius: 8px; margin-top: 15px; display: none; border: 1px solid #eee; }
    </style>
</head>
<body>
<div class="admin-container">
    <div id="loginSection">
        <h2>관리자 로그인</h2>
        <input type="email" id="adminEmail" placeholder="관리자 이메일" style="margin-bottom:10px;">
        <input type="password" id="adminPw" placeholder="비밀번호">
        <button onclick="handleLogin()" style="margin-top:10px;">로그인</button>
    </div>

    <div id="uploadSection">
        <h3>시설 정보 업데이트</h3>
        <div class="form-group">
            <label>시설 고유 ID (예: gym_prog, library_1)</label>
            <input type="text" id="facilityId" placeholder="고유 ID를 정확히 입력하세요">
        </div>
        <div class="form-group">
            <label>확인 날짜</label>
            <input type="date" id="uploadDate">
        </div>
        <div class="form-group">
            <label>정보 출처 링크</label>
            <input type="url" id="sourceLink" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>메모 (선택 사항)</label>
            <textarea id="memoText" style="height:80px;" placeholder="추가 설명을 적어주세요"></textarea>
        </div>
        <div class="form-group">
            <label>현장 사진</label>
            <input type="file" id="imageFile" accept="image/*" onchange="previewImage(this)">
            <img id="imgPreview" class="preview">
        </div>
        <button id="uploadBtn" onclick="handleUpload()">데이터 저장하기</button>
        <button onclick="handleLogout()" style="margin-top:10px; background:#6c757d;">로그아웃</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMAs8AuYNwgfwW9-BFqifPR0iV3KqHIAM",
        authDomain: "dcu-facility-admin.firebaseapp.com",
        projectId: "dcu-facility-admin",
        storageBucket: "dcu-facility-admin.firebasestorage.app",
        messagingSenderId: "828018517371",
        appId: "1:828018517371:web:783225b803a4272e47c9de"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleLogin = async () => {
        const email = document.getElementById('adminEmail').value;
        const pw = document.getElementById('adminPw').value;
        try { await signInWithEmailAndPassword(auth, email, pw); } 
        catch (e) { alert("로그인 실패!"); }
    };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        document.getElementById('loginSection').style.display = user ? 'none' : 'block';
        document.getElementById('uploadSection').style.display = user ? 'block' : 'none';
    });

    window.previewImage = (input) => {
        const preview = document.getElementById('imgPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    };

    window.handleUpload = async () => {
        const id = document.getElementById('facilityId').value;
        const date = document.getElementById('uploadDate').value;
        const link = document.getElementById('sourceLink').value;
        const memo = document.getElementById('memoText').value;
        const fileInput = document.getElementById('imageFile');
        const btn = document.getElementById('uploadBtn');

        if (!id || !date || !fileInput.files[0]) { alert("필수 항목을 채워주세요."); return; }

        btn.disabled = true;
        btn.innerText = "저장 중...";

        const reader = new FileReader();
        reader.readAsDataURL(fileInput.files[0]);
        reader.onload = async () => {
            try {
                const docRef = doc(db, "photos", id);
                await setDoc(docRef, {
                    updates: arrayUnion({ date, link, memo, image: reader.result })
                }, { merge: true });
                alert("저장 완료!");
                location.reload();
            } catch (e) { alert("오류: " + e.message); btn.disabled = false; }
        };
    };
</script>
</body>
</html>
