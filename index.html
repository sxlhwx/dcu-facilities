<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DCU 교내 시설 운영시간</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Base64 코드가 텍스트로 노출되는 것을 방지 */
  .info-source-card span, .info-source-card div {
    word-break: break-all;
  }
  /* 파일명 자리에 코드가 뜨면 숨기거나 처리하는 스타일 */
  #sb-body img[src*="data:image"] {
    display: block !important;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body onload="startWithFirebase()">

<div id="top-notice-bar" class="notice-bar" onclick="openNoticeModal()" style="display:none;">
  <span>📢</span><span id="notice-bar-title">공지사항</span>
</div>

<div id="overlay" onclick="closeSidebar(); closeNoticeModal();"></div>
<div id="img-overlay" onclick="closeImage()">
  <img id="img-expanded">
</div>

<div id="notice-modal" class="notice-modal">
  <div class="notice-modal-header">
    <span style="font-weight:700;">📢 공지사항</span>
  </div>
  <div id="notice-modal-content" class="notice-modal-content"></div>
</div>

<div id="sidebar"><div id="sb-body"></div></div>

<div class="topbar">
  <div class="topbar-title">DCU <span style="font-weight:400;color:#aaa;">|</span> <span style="font-weight:400">FACILITIES</span></div>
  <div class="topbar-clock" id="clock"></div>
</div>

<div class="subbar">
  <input id="search-input" type="text" placeholder="시설명 또는 구역 검색" oninput="handleSearch(this.value)" style="border:none;outline:none;font-family:var(--sans);font-size:11px;background:none;flex:1;" />
  
  <select id="mobile-cat-select" onchange="handleMobileCat(this.value)">
    <option value="all">전체</option>
    <option value="식당">식당</option>
    <option value="편의점">편의점</option>
    <option value="카페">카페</option>
    <option value="학습">학습</option>
    <option value="복지·문화">복지·문화</option>
  </select>

  <button class="cat-btn active" onclick="toggleCat('식당',this)">식당</button>
  <button class="cat-btn active" onclick="toggleCat('편의점',this)">편의점</button>
  <button class="cat-btn active" onclick="toggleCat('카페',this)">카페</button>
  <button class="cat-btn active" onclick="toggleCat('학습',this)">학습</button>
  <button class="cat-btn active" onclick="toggleCat('복지·문화',this)">복지·문화</button>
</div>

<div class="main-container">
  <div class="spacer"></div>
  <div class="fixed-header">
    <table class="facility-table">
      <thead>
        <tr>
          <th class="col-loc">위치</th>
          <th class="col-cat">구분</th>
          <th class="col-name">시설명</th>
          <th class="col-rem">남은시간</th>
          <th class="col-time">운영시간</th>
        </tr>
      </thead>
    </table>
  </div>
  <div class="scroll-area">
    <table class="facility-table">
      <tbody id="view-tbody"></tbody>
    </table>
  </div>
</div>

<div class="bottombar">
  <span class="bottombar-notice" id="bottom-notice"></span>
  <div class="view-toggle-group" style="margin-left:auto; display:flex; align-items:center; gap:8px;">
    <button class="view-toggle-btn" id="btn-desktop" onclick="toggleView('desktop')" style="background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:11px;color:var(--gray-400);">💻 데스크탑</button>
    <span class="view-toggle-sep" style="color:var(--gray-200);font-size:10px;">|</span>
    <button class="view-toggle-btn" id="btn-mobile" onclick="toggleView('mobile')" style="background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:11px;color:var(--gray-400);">📱 모바일</button>
  </div>
</div>

<script src="data/building.js?v=1.13.1"></script>
<script src="data/facility.js?v=1.13.1"></script>

<script type="module">
    // ✅ getDoc, doc 추가 임포트
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMAs8AuYNwgfwW9-BFqifPR0iV3KqHIAM",
        authDomain: "dcu-facility-admin.firebaseapp.com",
        projectId: "dcu-facility-admin",
        storageBucket: "dcu-facility-admin.firebasestorage.app",
        messagingSenderId: "828018517371",
        appId: "1:828018517371:web:783225b803a4272e47c9de"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.PHOTO_UPDATES = {};
    window.NOTICE_DATA = { active: false }; // 기본값

    window.startWithFirebase = async () => {
        try {
            // 1. 사진/업데이트 정보 불러오기
            const querySnapshot = await getDocs(collection(db, "photos"));
            querySnapshot.forEach((doc) => {
                const facilityId = doc.id;
                const data = doc.data();
                if (data.updates) {
                    window.PHOTO_UPDATES[facilityId] = data.updates.map(item => ({
                        file: item.image, // Base64 데이터
                        date: item.date,
                        url: item.link || "",
                        memo: item.memo || ""
                    }));
                }
            });

            // 2. ✅ 공지사항(settings/notice) 불러오기 추가
            const noticeRef = doc(db, "settings", "notice");
            const noticeSnap = await getDoc(noticeRef);
            if (noticeSnap.exists()) {
                window.NOTICE_DATA = noticeSnap.data();
            }
        } catch (e) {
            console.error(e);
        } finally {
            if (typeof init === "function") init();
        }
    };
</script>

<script src="js/time.js?v=1.13.1"></script>
<script src="js/notice-ui.js?v=1.13.1"></script>
<script src="js/list-ui.js?v=1.13.1"></script>
<script src="js/sidebar-ui.js?v=1.13.1"></script>
<script src="js/setup.js?v=1.13.1"></script>

</body>
</html>
